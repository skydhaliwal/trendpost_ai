# DEPLOY STRATEGY:
# - push to main (including merged PRs) → deploys to LIVE production site
# - pull request opened/updated → deploys to PREVIEW URL (temporary, 7 days)
# - pull request closed/merged → preview channel expires immediately
# - feature branches pushed directly → NO deployment triggered
# - FIREBASE_SERVICE_ACCOUNT_TRENDPOST_AI secret is added by Firebase CLI automatically

name: Firebase Deploy — TrendPost AI

on:
  push:
    branches:
      - main        # only main — not feature/*, develop, etc.
  pull_request:
    branches:
      - main        # only PRs targeting main
    types:
      - opened
      - synchronize
      - reopened
      - closed

jobs:
  deploy_live:
    name: Deploy to Production
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_TRENDPOST_AI }}
          channelId: live
          projectId: trendpost-ai

  deploy_preview:
    name: Deploy Preview
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_TRENDPOST_AI }}
          expires: 7d
          projectId: trendpost-ai

  cleanup_preview:
    name: Cleanup Preview on PR Close
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_TRENDPOST_AI }}
          expires: 0d
          projectId: trendpost-ai
